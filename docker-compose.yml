version: "3.9"

services:
  apirelatorios.webapi:
    image: ${DOCKER_REGISTRY-}apirelatorioswebapi
    build:
      context: .
      dockerfile: APIRelatorios.WebAPI/Dockerfile
    depends_on:
      - postgres-db
      - api-docx   
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__Host: postgres-db
      ConnectionStrings__Port: "5432"
      ConnectionStrings__Database: RelatorioDB
      ConnectionStrings__User: AdminTeste
      ConnectionStrings__Password: Teste123
    expose:
      - "8080"
    networks:
      - app-network

  api-docx:
    build:
      context: ./PythonDocx
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    networks:
      - app-network

  postgres-db:
    image: postgres:16
    environment:
      POSTGRES_DB: RelatorioDB
      POSTGRES_USER: AdminTeste
      POSTGRES_PASSWORD: Teste123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - apirelatorios.webapi
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network: