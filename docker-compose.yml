services:
  apirelatorios.webapi:
    image: apirelatorioswebapi:latest
    build:
      context: .
      dockerfile: APIRelatorios.WebAPI/Dockerfile

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      ConnectionStringsHost: postgres-db
      ConnectionStringsPort: "5432"
      ConnectionStringsDatabase: RelatorioDB
      ConnectionStringsUser: AdminTeste
      ConnectionStrings__Password: Teste123

    expose:
      - "8080"

    depends_on:
      postgres-db:
        condition: service_healthy
      api-docx:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - backend

  api-docx:
    build:
      context: ./PythonDocx
      dockerfile: Dockerfile

    expose:
      - "8000"

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

    networks:
      - backend

  postgres-db:
    image: postgres:16

    environment:
      POSTGRES_DB: RelatorioDB
      POSTGRES_USER: AdminTeste
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U AdminTeste -d RelatorioDB"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

    networks:
      - backend

  nginx:
    image: nginx:1.25
    container_name: nginx_proxy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./letsencrypt:/etc/letsencrypt:ro

    depends_on:
      - apirelatorios.webapi

    restart: unless-stopped

    networks:
      - frontend
      - backend

volumes:
  pgdata:

networks:
  frontend:
  backend:
    internal: true