events {}

http {
    server {
        listen 80;

        location / {
            proxy_pass http://apirelatorios.webapi:8080;
        }
    }

    server {
        listen 443 ssl;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        location / {
            proxy_pass http://apirelatorios.webapi:8080;
        }
    }
}